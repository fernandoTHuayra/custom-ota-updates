; ── Custom OTA Updates Server ──────────────────────────────────────────────────
; Copy this file to /etc/supervisor/conf.d/updates-server.conf and replace
; all %(...)s placeholders with your actual values.
;
; Required variables:
;   USER          - system user (e.g. otaupdates)
;   PROJECT_DIR   - absolute path to expo-updates-server/
;   HOSTNAME      - public URL (e.g. https://updates.example.com:3000)
;   PUBLISH_API_KEY - secret key for POST /api/publish
;   SSL_CERT_PATH, SSL_KEY_PATH, SSL_CA_PATH - paths to SSL certificates
;
[program:updates-server]
command=/usr/bin/env node server.js
directory=%(PROJECT_DIR)s
user=%(USER)s
autostart=true
autorestart=true
startsecs=10
stopasgroup=true
killasgroup=true

environment=
    NODE_ENV="production",
    PORT="3000",
    HOSTNAME="%(HOSTNAME)s",
    PRIVATE_KEY_PATH="code-signing-keys/private-key.pem",
    PUBLISH_API_KEY="%(PUBLISH_API_KEY)s",
    SSL_CERT_PATH="%(SSL_CERT_PATH)s",
    SSL_KEY_PATH="%(SSL_KEY_PATH)s",
    SSL_CA_PATH="%(SSL_CA_PATH)s"

stdout_logfile=%(PROJECT_DIR)s/logs/supervisor/updates-server.out.log
stderr_logfile=%(PROJECT_DIR)s/logs/supervisor/updates-server.err.log
stdout_logfile_maxbytes=20MB
stderr_logfile_maxbytes=20MB
stdout_logfile_backups=5
stderr_logfile_backups=5
